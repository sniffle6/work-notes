<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Work Notes — proposed redesign</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="app-extra.css" />
<style>
  html, body { height: 100%; }
  body { background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="inbox-screen.jsx"></script>
<script type="text/babel" src="other-screens.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="hero" title="Work Notes — proposed design" subtitle="Calm three-pane shell · capture-first · progressive disclosure">
          <DCArtboard id="inbox-default" label="01 · Inbox · default note selected" width={1280} height={800}>
            <InboxScreen initialSelectedId="n1" />
          </DCArtboard>
          <DCArtboard id="inbox-action" label="02 · Pinned · short note · no actions" width={1280} height={800}>
            <InboxScreen initialSelectedId="n2" />
          </DCArtboard>
        </DCSection>

        <DCSection id="states" title="States" subtitle="Parsing, parse-failed, reparse-with-feedback">
          <DCArtboard id="parsing" label="03 · Background parsing" width={1280} height={800}>
            <InboxScreen initialSelectedId="n6" />
          </DCArtboard>
          <DCArtboard id="failed" label="04 · Parse failed · banner + retry" width={1280} height={800}>
            <InboxScreen initialSelectedId="n4" initialFilter="failed" />
          </DCArtboard>
          <DCArtboard id="reparse" label="05 · Reparse with feedback open" width={1280} height={800}>
            <InboxScreen initialSelectedId="n1" initialReparseOpen={true} />
          </DCArtboard>
          <DCArtboard id="raw" label="06 · Raw view (toggle)" width={1280} height={800}>
            <InboxScreen initialSelectedId="n1" initialShowRaw={true} />
          </DCArtboard>
        </DCSection>

        <DCSection id="capture" title="Quick capture" subtitle="Bottom-right Tauri window, opened by the global hotkey">
          <DCArtboard id="qc" label="07 · Quick capture popup" width={480} height={360}>
            <QuickCapture />
          </DCArtboard>
        </DCSection>

        <DCSection id="settings" title="Settings" subtitle="Sheet over the app — not always-on">
          <DCArtboard id="settings" label="08 · Capture & parser settings" width={1280} height={800}>
            <SettingsSheet />
          </DCArtboard>
        </DCSection>

        <DCSection id="onboarding" title="First run" subtitle="Zero notes — teach capture in three steps">
          <DCArtboard id="empty" label="09 · Empty state · onboarding" width={1280} height={800}>
            <EmptyStateScreen />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
